<!DOCTYPE html>
<html>
<head>
    <title>Vod Review Tool</title>
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
</head>
<body>
    <!-- <input id="matchinp" type="text" placeholder="Input MCSR match url/id"/>
    <button id="submitbtn">Go</button>
    <button id="play">Play</button> -->
    <div id="vodcon"></div>
<script>
const input = document.getElementById('matchinp');
const button = document.getElementById('submitbtn');
const playbutton = document.getElementById('play');

let player = null;

async function run(x) {
    const res = await fetch('https://api.mcsrranked.com/matches/' + x);
    const data = await res.json();

    const vods = data.data.vod;

    if (vods.length === 0) {
        alert('This match has no vods');
    } else if (vods.length === 1) {
        openvod(vods, data);
    } else {
        alert('Unsupported amount of vods');
    }
}

async function openvod(vod, data) {

    const url = vod[0].url;

    const matchStart = data.data.date;
    const vodStart = vod[0].startsAt;
    const matchresult = data.data.result.time / 1000;

    const vodSeek = matchStart - vodStart - 10 - matchresult;

    const match = url.match(/videos\/(\d+)/);
    const videoId = match ? match[1] : null;

    console.log(url + '?t=' + Math.floor(vodSeek) + 's');

    const vodcon = document.getElementById('vodcon');

    vodcon.innerHTML = `
        <div id="playerbig" style="
            width:1600px;
            height:800px;
            display:block;
            visibility: visible;
            z-index: 500;
        "></div>
    `;

    player = new Twitch.Player("playerbig", {
        width: 1600,
        height: 800,
        video: videoId,
        time: Math.floor(vodSeek),
        autoplay: true,
        parent: [location.hostname],
    });

    await new Promise(resolve => {
        player.addEventListener(Twitch.Player.READY, resolve);
    });
}

function playonevod() {
    if (player) {
        player.play();
    }
}

input.addEventListener('input', () => {

    const match = input.value.match(
        /^https?:\/\/mcsrranked\.com\/stats\/[^/]+\/([^/?]+)/
    );

    if (match) {
        input.value = match[1];
    }
});

input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        run(input.value);
    }
});

button.addEventListener('click', () => {
    run(input.value);
});

playbutton.addEventListener('click', () => {
    playonevod();
});
</script>

</body>
</html>
